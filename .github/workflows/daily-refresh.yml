name: Daily Refresh

on:
  schedule:
    # 6:00 AM Central Time = 11:00 UTC (CDT) / 12:00 UTC (CST)
    # Using 11:00 UTC to favor the active daylight saving period
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Install xvfb (virtual display for CAPTCHA-flagged counties)
        run: sudo apt-get install -y xvfb

      - name: Run auction scrapers (all 10 counties under xvfb)
        id: scrape
        run: xvfb-run -a python -m core.auction.universal --all --days=14

      - name: Run Cuyahoga docket enrichment (under xvfb)
        id: dockets
        if: success()
        run: xvfb-run -a python -m core.dockets.enrich cuyahoga-oh
        continue-on-error: true

      - name: Export dashboard data
        id: dashboard
        if: success()
        run: python -m core.dashboard_data

      - name: Commit and push refreshed data
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "=== Files in docs/data/ ==="
          ls -la docs/data/ || echo "(no docs/data/ directory)"

          echo "=== Git status before add ==="
          git status

          echo "=== Adding docs/data/ ==="
          git add docs/data/

          echo "=== Git status after add ==="
          git status

          if git diff --cached --quiet; then
            echo "No staged changes after add. Nothing to commit."
          else
            echo "=== Staged changes detected. Committing ==="
            git commit -m "Daily refresh $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "=== Push complete ==="
          fi

      - name: Report failure
        if: failure()
        run: |
          echo "::error::Daily refresh failed. Check the step logs above."
          echo "Scraper step outcome:   ${{ steps.scrape.outcome }}"
          echo "Docket step outcome:    ${{ steps.dockets.outcome }}"
          echo "Dashboard step outcome: ${{ steps.dashboard.outcome }}"
          exit 1
