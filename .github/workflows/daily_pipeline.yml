name: SurplusIQ Daily Pipeline

on:
  schedule:
    # Run every weekday at 7:00 AM EST (12:00 UTC)
    - cron: "0 12 * * 1-5"
  workflow_dispatch:
    inputs:
      counties:
        description: "County IDs (space-separated, leave blank for all)"
        required: false
        default: ""
      skip_enrich:
        description: "Skip PropertyRadar enrichment"
        required: false
        default: "false"
      skip_clerk:
        description: "Skip clerk docket checks"
        required: false
        default: "false"

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install playwright requests beautifulsoup4 openpyxl pandas python-dotenv lxml
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env
        run: |
          echo "PROPERTY_RADAR_TOKEN=${{ secrets.PROPERTY_RADAR_TOKEN }}" > .env
          echo "EXCESS_ELITE_API_KEY=${{ secrets.EXCESS_ELITE_API_KEY }}" >> .env

      - name: Run pipeline
        run: |
          COUNTIES="${{ github.event.inputs.counties }}"
          SKIP_ENRICH="${{ github.event.inputs.skip_enrich }}"
          SKIP_CLERK="${{ github.event.inputs.skip_clerk }}"

          CMD="python run.py"
          if [ -n "$COUNTIES" ]; then
            CMD="$CMD --counties $COUNTIES"
          fi
          if [ "$SKIP_ENRICH" = "true" ]; then
            CMD="$CMD --skip-enrich"
          fi
          if [ "$SKIP_CLERK" = "true" ]; then
            CMD="$CMD --skip-clerk"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Commit dashboard data
        run: |
          git config user.name  "SurplusIQ Bot"
          git config user.email "bot@surplusiq.io"
          git add dashboard/data/
          git add output/*.xlsx || true
          git diff --staged --quiet || git commit -m "📊 Daily update $(date +%Y-%m-%d)"
          git push

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SurplusIQ-Leads-${{ github.run_id }}
          path: output/SurplusIQ_Leads_*.xlsx
          retention-days: 30
